name: CI

# bereme-protocol is the shared device <-> cloud wire-types crate.
# CI is intentionally minimal — pure-Rust, no system deps.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_INCREMENTAL: "0"

jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        run: rustup show

      - name: Restore cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --all-features

      - name: cargo doc (no broken intra-doc links)
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings -D rustdoc::broken-intra-doc-links"

  msrv:
    name: minimum supported rust version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MSRV toolchain
        # `rust-version` in Cargo.toml is the source of truth.
        run: |
          msrv=$(grep '^rust-version' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          rustup toolchain install "$msrv" --profile minimal
          rustup default "$msrv"
      - name: cargo check
        run: cargo check --all-features
